<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connect Gard | Stopwatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                        url('home-bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .sidebar { 
            width: 260px; height: 100vh; position: fixed; 
            background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(10px);
            border-right: 1px solid #1f2937; 
        }
        .main-content { margin-left: 260px; padding: 40px; }
        .glass-panel { 
            background: rgba(31, 41, 55, 0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .timer-text { font-family: 'Courier New', Courier, monospace; letter-spacing: -2px; }
    </style>
</head>
<body class="text-white">

    <nav class="sidebar p-6 flex flex-col justify-between">
        <div>
            <div class="flex items-center gap-3 mb-10">
                <img src="logo.png" alt="Logo" class="w-10 h-10 object-contain">
                <h2 class="font-bold text-xl tracking-tight text-indigo-400">Connect Gard</h2>
            </div>
            <ul class="space-y-4 text-gray-400">
                <li onclick="window.location.href='home.html'" class="hover:text-white cursor-pointer flex items-center gap-3 p-3"><span>🏠</span> Home</li>
                <li onclick="window.location.href='blocker.html'" class="hover:text-white cursor-pointer flex items-center gap-3 p-3"><span>🚫</span> Block Apps</li>
                <li class="hover:text-white cursor-pointer flex items-center gap-3 bg-indigo-600/20 p-3 rounded-xl text-indigo-400 font-bold"><span>⏱️</span> Stopwatch</li>
            </ul>
        </div>
    </nav>

    <main class="main-content flex flex-col items-center">
        <header class="w-full mb-10">
            <h1 class="text-3xl font-bold">Study Stopwatch ⏱️</h1>
            <p class="text-gray-400 mt-2">Track your learning hours with precision.</p>
        </header>

        <div class="glass-panel w-full max-w-2xl p-12 rounded-3xl text-center shadow-2xl">
            <div id="display" class="timer-text text-8xl font-bold mb-10 text-indigo-500">00:00:00</div>
            
            <div class="flex justify-center gap-4">
                <button onclick="startStop()" id="startBtn" class="bg-indigo-600 hover:bg-indigo-500 px-10 py-3 rounded-full font-bold transition">Start</button>
                <button onclick="recordLap()" class="bg-gray-700 hover:bg-gray-600 px-10 py-3 rounded-full font-bold transition">Lap (Subject)</button>
                <button onclick="reset()" class="bg-red-900/40 hover:bg-red-600 px-10 py-3 rounded-full font-bold transition">Reset</button>
            </div>
        </div>

        <div class="w-full max-w-2xl mt-10">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><span>📝</span> Session Laps</h3>
            <div id="lapsContainer" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                <p class="text-gray-500 italic">No laps recorded yet.</p>
            </div>
        </div>
    </main>

    <script>
        let startTime, elapsedTime = 0, timerInterval;

        function timeToString(time) {
            let diffInHrs = time / 3600000;
            let hh = Math.floor(diffInHrs);

            let diffInMin = (diffInHrs - hh) * 60;
            let mm = Math.floor(diffInMin);

            let diffInSec = (diffInMin - mm) * 60;
            let ss = Math.floor(diffInSec);

            let formattedHH = hh.toString().padStart(2, "0");
            let formattedMM = mm.toString().padStart(2, "0");
            let formattedSS = ss.toString().padStart(2, "0");

            return `${formattedHH}:${formattedMM}:${formattedSS}`;
        }

        function print(txt) {
            document.getElementById("display").innerHTML = txt;
        }

        function startStop() {
            if (document.getElementById("startBtn").innerHTML === "Start") {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(function printTime() {
                    elapsedTime = Date.now() - startTime;
                    print(timeToString(elapsedTime));
                }, 1000);
                document.getElementById("startBtn").innerHTML = "Pause";
                document.getElementById("startBtn").classList.replace('bg-indigo-600', 'bg-yellow-600');
            } else {
                clearInterval(timerInterval);
                document.getElementById("startBtn").innerHTML = "Start";
                document.getElementById("startBtn").classList.replace('bg-yellow-600', 'bg-indigo-600');
            }
        }

        function reset() {
            clearInterval(timerInterval);
            print("00:00:00");
            elapsedTime = 0;
            document.getElementById("startBtn").innerHTML = "Start";
            document.getElementById("lapsContainer").innerHTML = '<p class="text-gray-500 italic">No laps recorded yet.</p>';
        }

        function recordLap() {
            if (elapsedTime === 0) return;
            const lapsContainer = document.getElementById("lapsContainer");
            if (lapsContainer.querySelector('p')) lapsContainer.innerHTML = '';

            const lapTime = timeToString(elapsedTime);
            const lapDiv = document.createElement("div");
            lapDiv.className = "glass-panel p-4 rounded-xl flex justify-between items-center animate-fade-in";
            lapDiv.innerHTML = `
                <span class="text-indigo-400 font-bold">Subject Slot</span>
                <span class="font-mono text-xl">${lapTime}</span>
            `;
            lapsContainer.prepend(lapDiv);
        }
    </script>
</body>
</html>
